name: Deploy Flutter Web to CasaOS

on:
  push:
    branches:
      - main  # Asegúrate de que este es el nombre de tu rama principal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Web
        run: |
          flutter pub get
          flutter build web --release

      - name: Deploy to NAS via Cloudflare Tunnel
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.NAS_HOST }} # Aquí debe estar ssh.angelcantero.store
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          port: ${{ secrets.NAS_PORT }}
          proxy_command: cloudflared access ssh --hostname ${{ secrets.NAS_HOST }}
          source: "build/web/*"
          target: "/DATA/AppData/flutter_web"
          strip_components: 2
