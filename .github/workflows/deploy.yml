name: Deploy Flutter Web to CasaOS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Restore Firebase config
        run: |
          mkdir -p lib
          cat << 'EOF' > lib/firebase_options.dart
          ${{ secrets.FIREBASE_OPTIONS }}
          EOF

      - name: Build Web
        run: |
          flutter pub get
          flutter build web --release --no-wasm-dry-run

      - name: Configure SSH for Cloudflare Tunnel
        run: |
          mkdir -p ~/.ssh
          echo "Host ${{ secrets.NAS_HOST }}" >> ~/.ssh/config
          echo "  ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy to NAS
        env:
          SSH_KEY: ${{ secrets.NAS_SSH_KEY }}
          NAS_HOST: ${{ secrets.NAS_HOST }}
          NAS_USER: ${{ secrets.NAS_USER }}
        run: |
          # 1. Configurar la clave privada
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 2. Configurar el túnel en el SSH nativo
          cat >> ~/.ssh/config <<EOF
          Host $NAS_HOST
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h
            StrictHostKeyChecking no
          EOF

          # 3. Enviar los archivos usando SCP estándar
          # Usamos -r para carpetas y apuntamos al build de flutter
          scp -r build/web/* $NAS_USER@$NAS_HOST:/DATA/AppData/flutter_web/