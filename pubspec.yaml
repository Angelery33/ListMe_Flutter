name: list_me
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  intl: ^0.19.0
  shared_preferences: ^2.3.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: 1.2.1
  image_cropper: ^8.0.2
  permission_handler: ^11.3.1
  http: ^1.2.2
  firebase_core: ^3.12.1
  firebase_storage: ^12.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#162040"
  adaptive_icon_foreground: "assets/images/logo.png"
  web:
    generate: true
    image_path: "assets/images/logo.png"
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/logo.png"
  linux:
    generate: true
    image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/background.png
    - assets/images/logobiblio.png
    - assets/images/logo.png
